<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Leonardo KI - Museum</title>
    <style>
        body { margin: 0; background-color: #000; display: flex; flex-direction: column; height: 100vh; color: #d4af37; font-family: 'Georgia', serif; overflow: hidden; }
        
        /* Lade-Anzeige */
        #loading-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 65vh;
            background: #000; display: flex; align-items: center; justify-content: center;
            z-index: 10; font-style: italic; color: #d4af37;
        }

        model-viewer { height: 65vh; width: 100%; background: #000; }
        
        #ui-container { height: 35vh; background: #000; border-top: 1px solid #d4af37; display: flex; flex-direction: column; align-items: center; padding: 10px; box-sizing: border-box; }
        
        #status-text { font-style: italic; color: #888; font-size: 12px; margin-bottom: 5px; }
        
        #mic-button { 
            width: 70px; height: 70px; border-radius: 50%; border: 2px solid #d4af37; 
            background: #1a1a1a; display: flex; align-items: center; justify-content: center; 
            margin-bottom: 10px; flex-shrink: 0; cursor: pointer;
            outline: none !important; -webkit-tap-highlight-color: transparent;
        }
        
        #mic-button.listening { background: #600; border-color: #f44; box-shadow: 0 0 15px #f44; }

        #transcript { font-size: 16px; color: #d4af37; text-align: center; width: 95%; height: 80px; overflow-y: auto; }
        
        svg { fill: #d4af37; width: 32px; height: 32px; pointer-events: none; }
    </style>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
</head>
<body>

    <div id="loading-overlay">Leonardo erwacht...</div>

    <model-viewer id="leo" src="leonardo.glb" interaction-prompt="none" 
                  camera-target="0m 1.72m 0m" camera-orbit="0deg 90deg 0.35m" field-of-view="6deg">
    </model-viewer>

    <div id="ui-container">
        <div id="status-text">Bereit</div>
        <button id="mic-button">
            <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
        </button>
        <div id="transcript">Tippe auf das Mikrofon...</div>
    </div>

    <script>
        const micButton = document.getElementById('mic-button');
        const statusText = document.getElementById('status-text');
        const transcriptDiv = document.getElementById('transcript');
        const modelViewer = document.getElementById('leo');
        const loadingOverlay = document.getElementById('loading-overlay');

        // Lade-Overlay entfernen, wenn Modell bereit
        modelViewer.addEventListener('load', () => {
            loadingOverlay.style.display = 'none';
        });

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null;
        let isAudioUnlocked = false;

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = 'de-DE';

            recognition.onresult = (event) => {
                const userText = event.results[0][0].transcript;
                transcriptDiv.innerText = "Du: " + userText;
                speak("Ich habe dich verstanden. Mein Geist ist bereit.");
            };

            recognition.onend = () => { micButton.classList.remove('listening'); };
            recognition.onerror = () => { micButton.classList.remove('listening'); };
        }

        function speak(text) {
    window.speechSynthesis.cancel();
    
    // Kleiner Delay für iOS Stabilität
    setTimeout(() => {
        const msg = new SpeechSynthesisUtterance(text);
        const voices = window.speechSynthesis.getVoices();
        
        // PRIORITÄTEN-LISTE DER STIMMEN
        // Wir suchen nacheinander nach diesen Begriffen im Namen
        const preferredVoices = [
            'Conrad',          // Windows/Chrome (Sehr gut, männlich)
            'Kasper',          // iOS/Safari (Männlich, weise)
            'Yannick',         // macOS/iOS
            'Deutsch Deutschland', // Google Standard
            'Male',            // Allgemeiner Filter
            'Deutsch'          // Letzter Rettungsanker
        ];

        let selectedVoice = null;
        
        // Wir gehen die Prioritäten durch
        for (let name of preferredVoices) {
            selectedVoice = voices.find(v => v.name.includes(name) && v.lang.startsWith('de'));
            if (selectedVoice) break;
        }

        if (selectedVoice) {
            msg.voice = selectedVoice;
            console.log("Gewählte Stimme: " + selectedVoice.name);
        }

        msg.lang = 'de-DE';
        msg.pitch = 0.85; // Etwas tiefer für Leonardo
        msg.rate = 0.9;   // Etwas langsamer für mehr Würde
        msg.volume = 1.0;

        window.speechSynthesis.speak(msg);
    }, 150);
}

// WICHTIG: Stimmen werden oft verzögert geladen
window.speechSynthesis.onvoiceschanged = () => {
    console.log("Stimmen aktualisiert:", window.speechSynthesis.getVoices().length);
};

        micButton.addEventListener('click', () => {
            // WICHTIG FÜR IPAD: Audio beim allerersten Klick entsperren
            if (!isAudioUnlocked) {
                window.speechSynthesis.speak(new SpeechSynthesisUtterance(""));
                isAudioUnlocked = true;
            }
            
            window.speechSynthesis.resume();
            
            if (recognition) {
                try {
                    recognition.start();
                    micButton.classList.add('listening');
                    statusText.innerText = "Ich höre zu...";
                } catch (e) {}
            }
        });
    </script>
</body>
</html>
