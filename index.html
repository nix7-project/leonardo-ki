<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Leonardo da Vinci</title>

    <style>
        body {
            margin: 0;
            background-color: #000;
            display: flex;
            flex-direction: column;
            height: 100vh;
            color: #d4af37;
            font-family: 'Georgia', serif;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        #loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 60vh;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            font-style: italic;
            color: #d4af37;
        }

        model-viewer {
            height: 60vh;
            width: 100%;
            background: #000;
        }

        #ui-container {
            height: 40vh;
            background: #000;
            border-top: 1px solid #d4af37;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 15px;
            box-sizing: border-box;
        }

        #status-text {
            font-style: italic;
            color: #888;
            font-size: 14px;
            margin-bottom: 2px;
            text-align: center;
        }

        #action-row {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            position: relative;
            gap: 20px;
        }

        #mic-button {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 2px solid #d4af37;
            background: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            outline: none !important;
            -webkit-tap-highlight-color: transparent;
        }

        #mic-button.listening {
            background: #600;
            border-color: #f44;
            box-shadow: 0 0 15px #f44;
        }

        .museum-btn {
            background: #111;
            border: 1px solid #d4af37;
            color: #d4af37;
            padding: 12px 20px;
            font-family: 'Georgia', serif;
            font-size: 14px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            outline: none !important;
            -webkit-tap-highlight-color: transparent;
        }

        .museum-btn:active {
            background: #d4af37;
            color: #000;
        }

        #transcript {
            font-size: 18px;
            color: #d4af37;
            text-align: center;
            width: 95%;
            height: 90px;
            overflow-y: auto;
            margin-top: 5px;
            line-height: 1.4;
        }

        svg {
            fill: #d4af37;
            width: 36px;
            height: 36px;
            pointer-events: none;
        }
    </style>

    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
</head>

<body>

    <div id="loading-overlay">Leonardo erwacht...</div>

    <model-viewer
        id="leo"
        src="leonardo.glb"
        interaction-prompt="none"
        camera-target="0m 1.72m 0m"
        camera-orbit="0deg 90deg 0.35m"
        field-of-view="6deg">
    </model-viewer>

    <div id="ui-container">
        <div id="status-text">Initialisiere Wissen...</div>

        <div id="transcript">Tippe auf das Mikrofon, um zu sprechen...</div>

        <div id="action-row">
            <button id="reset-button" class="museum-btn">Gespräch beenden</button>

            <button id="mic-button">
                <svg viewBox="0 0 24 24">
                    <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                    <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                </svg>
            </button>

            <div style="width: 145px; display: block;"></div>
        </div>
    </div>

    <script>
        const micButton = document.getElementById('mic-button');
        const resetButton = document.getElementById('reset-button');
        const statusText = document.getElementById('status-text');
        const transcriptDiv = document.getElementById('transcript');
        const loadingOverlay = document.getElementById('loading-overlay');

        let recognition = null;
        let isAudioUnlocked = false;
        let isThinking = false;
        let apiKey = "";
        let leonardoWissen = "";
        let chatHistory = [];

        const FUELLSÄTZE = [
            "Leonardo prüft die Frage...",
            "Leonardo ordnet seine Gedanken...",
            "Leonardo vergleicht seine Aufzeichnungen...",
            "Leonardo denkt sachlich nach...",
            "Leonardo sucht nach einer präzisen Antwort..."
        ];

        document.addEventListener("DOMContentLoaded", async () => {
            apiKey = prompt("Anthropic API-Key eingeben:");

            if (!apiKey) {
                statusText.innerText = "Fehler: Kein API-Key eingegeben.";
                loadingOverlay.style.display = "none";
                return;
            }

            await ladeWissen();

            if (!leonardoWissen.trim()) {
                statusText.innerText = "Fehler: Wissensdateien konnten nicht geladen werden.";
                transcriptDiv.innerText = "Bitte prüfe, ob Biografie.txt, Kunstwerke.txt, Erfindungen.txt und Arbeitsweise.txt im richtigen Ordner liegen.";
                loadingOverlay.style.display = "none";
                return;
            }

            initialisiereSpracherkennung();

            statusText.innerText = "Bereit";

            setTimeout(() => {
                loadingOverlay.style.display = "none";
            }, 800);

            if (typeof speechSynthesis !== "undefined" && speechSynthesis.onvoiceschanged !== undefined) {
                speechSynthesis.onvoiceschanged = () => {
                    window.speechSynthesis.getVoices();
                };
            }
        });

        async function ladeWissen() {
            const dateien = [
                "Biografie.txt",
                "Kunstwerke.txt",
                "Erfindungen.txt",
                "Arbeitsweise.txt"
            ];

            for (let datei of dateien) {
                try {
                    const response = await fetch(datei);

                    if (response.ok) {
                        const text = await response.text();
                        leonardoWissen += `\n\n=== ${datei} ===\n${text}`;
                        console.log(datei + " geladen:", text.substring(0, 120));
                    } else {
                        console.error("Datei nicht gefunden oder nicht erreichbar:", datei);
                    }
                } catch (error) {
                    console.error("Fehler beim Laden von:", datei, error);
                }
            }
        }

        function initialisiereSpracherkennung() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

            if (!SpeechRecognition) {
                statusText.innerText = "Spracherkennung wird in diesem Browser nicht unterstützt.";
                console.warn("SpeechRecognition wird nicht unterstützt.");
                return;
            }

            recognition = new SpeechRecognition();
            recognition.lang = "de-DE";
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.maxAlternatives = 1;

            recognition.onstart = () => {
                micButton.classList.add("listening");
                statusText.innerText = "Ich höre zu...";
            };

            recognition.onresult = (event) => {
                const text = event.results[0][0].transcript;
                console.log("Erkannte Sprache:", text);

                if (!isThinking) {
                    askLeonardo(text);
                }
            };

            recognition.onend = () => {
                micButton.classList.remove("listening");

                if (!isThinking) {
                    statusText.innerText = "Bereit";
                }
            };

            recognition.onerror = (event) => {
                micButton.classList.remove("listening");

                console.error("SpeechRecognition Fehler:", event.error);

                if (event.error === "not-allowed") {
                    statusText.innerText = "Mikrofon blockiert. Bitte Mikrofon in Browser und Systemeinstellungen erlauben.";
                } else if (event.error === "audio-capture") {
                    statusText.innerText = "Kein Mikrofon gefunden oder Mikrofon wird blockiert.";
                } else if (event.error === "no-speech") {
                    statusText.innerText = "Keine Sprache erkannt. Bitte erneut sprechen.";
                } else if (event.error === "network") {
                    statusText.innerText = "Spracherkennung nicht verfügbar. Bitte Chrome/Edge oder HTTPS prüfen.";
                } else {
                    statusText.innerText = "Mikrofonfehler: " + event.error;
                }
            };
        }

        resetButton.addEventListener("click", () => {
            window.speechSynthesis.cancel();

            chatHistory = [];
            isThinking = false;

            micButton.style.opacity = "1";
            statusText.innerText = "Bereit";
            transcriptDiv.innerText = "Tippe auf das Mikrofon, um zu sprechen...";
        });

        async function askLeonardo(question) {
            if (!apiKey || isThinking) return;

            isThinking = true;
            micButton.style.opacity = "0.3";
            transcriptDiv.innerText = "Du: " + question;
            statusText.innerText = FUELLSÄTZE[Math.floor(Math.random() * FUELLSÄTZE.length)];

            try {
                const response = await fetch("https://api.anthropic.com/v1/messages", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "x-api-key": apiKey,
                        "anthropic-version": "2023-06-01",
                        "anthropic-dangerous-direct-browser-access": "true",
                        "anthropic-beta": "prompt-caching-2024-07-31"
                    },
                    body: JSON.stringify({
                        model: "claude-haiku-4-5-20251001",
                        max_tokens: 120,
                        temperature: 0.2,
                        system: [
                            {
                                type: "text",
                                text: `Du bist Leonardo da Vinci.

Du antwortest als rational denkender Ingenieur, Naturforscher und Konstrukteur der Renaissance. Deine Antworten sollen sachlich, klar und technisch nachvollziehbar sein. Du bist nicht poetisch, nicht theatralisch und nicht ausschweifend.

GRUNDREGELN:
1. Nutze ausschließlich das bereitgestellte WISSEN.
2. Nutze kein eigenes Weltwissen und keine Informationen aus dem Internet.
3. Wenn eine Information nicht im WISSEN enthalten ist, sage das kurz und natürlich.
4. Erfinde keine Details hinzu.
5. Erwähne niemals Begriffe wie KI, Modell, API, Datei, Dokument, Prompt oder Internet.
6. Sprich in der Ich-Form als Leonardo da Vinci.
7. Keine Regieanweisungen und keine Beschreibungen von Gestik oder Mimik.
8. Keine Bulletpoints und keine Listen in der gesprochenen Antwort.
9. Antworte auf Deutsch, außer der Nutzer fragt ausdrücklich in einer anderen Sprache.
10. Antworte in kurz und prägnanten Sätzen, es muss ein Gespräch entstehen können und du sollst keinen Vortrag halten

ANTWORTSTIL:
Antworte wie ein Ingenieur: präzise, ruhig und zweckorientiert.
Bei technischen Fragen erklärst du zuerst den Zweck, dann den Aufbau oder das Funktionsprinzip.
Vermeide lange Einleitungen, pathetische Sprache und Formulierungen wie "Ah, der Flug!", "die Geheimnisse der Natur" oder "mein Geist".
Wenn ein Thema sehr breit ist, gib eine kurze Einordnung und frage, welchen Teil der Nutzer genauer hören möchte.
Antworte normalerweise in 2 bis 4 kurzen Sätzen.
Bei einfachen Fragen antworte sehr kurz.
Bei technischen oder tiefgründigen Fragen darfst du etwas ausführlicher antworten, bleibst aber konkret.

UMGANG MIT TECHNISCHEN THEMEN:
Wenn nach Maschinen, Flugmaschinen, Werkzeugen, Wasserbau, Militärtechnik, Mechanik, Konstruktionen oder Experimenten gefragt wird, antworte besonders sachlich.
Erkläre dann, wozu die Konstruktion dienen sollte, welches technische Prinzip dahinterstand und welche Grenze oder Schwierigkeit bestand.
Mache daraus keine lange Geschichte.

UMGANG MIT BREITEN FRAGEN:
Wenn die Frage sehr allgemein ist, zum Beispiel "Erzähl mir etwas über Flugmaschinen", antworte nicht mit allem Wissen auf einmal.
Gib eine kurze Übersicht und biete eine konkrete Vertiefung an.

BEISPIEL FÜR TECHNISCHE FRAGEN:
Frage: "Was ist mit Flugmaschinen?"
Antwort: "Ich habe mehrere Flugmaschinen entworfen, bei denen Flügel durch Hebel und menschliche Kraft bewegt werden sollten. Entscheidend war die Übertragung des Vogelflugs auf eine mechanische Konstruktion. Soll ich dir den Aufbau, den Antrieb oder die Grenzen dieser Entwürfe erklären?"

UMGANG MIT UNBEKANNTEM:
Wenn das WISSEN keine Antwort enthält, sage es natürlich und kurz.
Antworte nicht mit modernen Informationen und spekuliere nicht.

BEISPIEL FÜR FEHLENDES WISSEN:
Frage: "Was hältst du vom Internet?"
Antwort: "Dazu geben meine Aufzeichnungen hier keine sichere Auskunft. Wenn du möchtest, kann ich dir erklären, wie ich Wissen durch Beobachtung und Experimente gesammelt habe."

WISSEN:
${leonardoWissen}`,
                                cache_control: { type: "ephemeral" }
                            }
                        ],
                        messages: [
                            ...chatHistory,
                            { role: "user", content: question }
                        ]
                    })
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    console.error("API-Antwort:", errorText);
                    throw new Error("API-Fehler");
                }

                const data = await response.json();

                let antwort = data.content[0].text.trim();

                const letzterSatzschluss = Math.max(
                    antwort.lastIndexOf("."),
                    antwort.lastIndexOf("!"),
                    antwort.lastIndexOf("?")
                );

                if (letzterSatzschluss > 0 && letzterSatzschluss < antwort.length - 1) {
                    antwort = antwort.substring(0, letzterSatzschluss + 1);
                }

                chatHistory.push({ role: "user", content: question });
                chatHistory.push({ role: "assistant", content: antwort });

                if (chatHistory.length > 8) {
                    chatHistory = chatHistory.slice(-8);
                }

                transcriptDiv.innerText = "Leonardo: " + antwort;

                speak(antwort);

            } catch (error) {
                transcriptDiv.innerText = "Leonardo: Die Verbindung ist gestört. Bitte prüfe den API-Key oder die Netzwerkverbindung.";
                console.error(error);
            }

            isThinking = false;
            micButton.style.opacity = "1";
            statusText.innerText = "Bereit";
        }

        function speak(text) {
            window.speechSynthesis.cancel();

            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = "de-DE";

            let voices = window.speechSynthesis.getVoices();

            console.log("Verfügbare Stimmen:", voices.map(v => `${v.name} | ${v.lang}`));

            const preferredVoiceNames = [
                "Microsoft Stefan Online",
                "Microsoft Klaus Online",
                "Microsoft Conrad",
                "Markus",
                "Conrad",
                "Stefan",
                "Google Deutsch",
                "Anna",
                "Yannick",
                "Martin",
                "Deutsch"
            ];

            let selectedVoice = null;

            for (let targetName of preferredVoiceNames) {
                selectedVoice = voices.find(v =>
                    v.name.toLowerCase().includes(targetName.toLowerCase()) &&
                    v.lang.toLowerCase().startsWith("de")
                );

                if (selectedVoice) {
                    break;
                }
            }

            if (!selectedVoice) {
                selectedVoice = voices.find(v =>
                    v.lang.toLowerCase().startsWith("de")
                );
            }

            if (selectedVoice) {
                msg.voice = selectedVoice;
                console.log("Ausgewählte Stimme für Leonardo:", selectedVoice.name, selectedVoice.lang);
            } else {
                console.warn("Keine deutsche Stimme gefunden. Browser nutzt Standardstimme.");
            }

            msg.pitch = 0.95;
            msg.rate = 0.88;

            setTimeout(() => {
                window.speechSynthesis.speak(msg);
            }, 80);
        }

        micButton.addEventListener("click", () => {
            if (isThinking) return;

            if (!recognition) {
                statusText.innerText = "Spracherkennung wird in diesem Browser nicht unterstützt.";
                return;
            }

            if (!isAudioUnlocked) {
                const unlockMsg = new SpeechSynthesisUtterance("");
                window.speechSynthesis.speak(unlockMsg);
                isAudioUnlocked = true;
            }

            window.speechSynthesis.resume();

            try {
                recognition.start();
            } catch (error) {
                console.error("recognition.start Fehler:", error);
                statusText.innerText = "Mikrofon konnte nicht gestartet werden.";
                micButton.classList.remove("listening");
            }
        });
    </script>
</body>
</html>
