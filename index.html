<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Leonardo KI - Museum</title>
    <style>
        body { margin: 0; background-color: #000; display: flex; flex-direction: column; height: 100vh; color: #d4af37; font-family: 'Georgia', serif; overflow: hidden; }
        
        /* Lade-Anzeige */
        #loading-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 65vh;
            background: #000; display: flex; align-items: center; justify-content: center;
            z-index: 10; font-style: italic; color: #d4af37;
        }

        model-viewer { height: 65vh; width: 100%; background: #000; }
        
        #ui-container { height: 35vh; background: #000; border-top: 1px solid #d4af37; display: flex; flex-direction: column; align-items: center; padding: 10px; box-sizing: border-box; }
        
        #status-text { font-style: italic; color: #888; font-size: 12px; margin-bottom: 5px; }
        
        #mic-button { 
            width: 70px; height: 70px; border-radius: 50%; border: 2px solid #d4af37; 
            background: #1a1a1a; display: flex; align-items: center; justify-content: center; 
            margin-bottom: 10px; flex-shrink: 0; cursor: pointer;
            outline: none !important; -webkit-tap-highlight-color: transparent;
        }
        
        #mic-button.listening { background: #600; border-color: #f44; box-shadow: 0 0 15px #f44; }

        #transcript { font-size: 16px; color: #d4af37; text-align: center; width: 95%; height: 80px; overflow-y: auto; }
        
        svg { fill: #d4af37; width: 32px; height: 32px; pointer-events: none; }
    </style>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
</head>
<body>

    <div id="loading-overlay">Leonardo erwacht...</div>

    <model-viewer id="leo" src="leonardo.glb" interaction-prompt="none" 
                  camera-target="0m 1.72m 0m" camera-orbit="0deg 90deg 0.35m" field-of-view="6deg">
    </model-viewer>

    <div id="ui-container">
        <div id="status-text">Bereit</div>
        <button id="mic-button">
            <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
        </button>
        <div id="transcript">Tippe auf das Mikrofon...</div>
    </div>

    <script>
        const micButton = document.getElementById('mic-button');
        const statusText = document.getElementById('status-text');
        const transcriptDiv = document.getElementById('transcript');
        const modelViewer = document.getElementById('leo');
        const loadingOverlay = document.getElementById('loading-overlay');

        let recognition = null;
        let isAudioUnlocked = false;
        let isThinking = false; // Sperrt den Button, während die KI arbeitet

        // Lade-Overlay entfernen, sobald das 3D-Modell geladen ist
        modelViewer.addEventListener('load', () => {
            loadingOverlay.style.display = 'none';
        });

        // Spracherkennung einrichten
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = 'de-DE';

            recognition.onresult = (event) => {
                if (isThinking) return;
                const userText = event.results[0][0].transcript;
                transcriptDiv.innerText = "Du: " + userText;
                
                // Hier rufen wir die KI-Logik auf
                askLeonardo(userText);
            };

            recognition.onend = () => { micButton.classList.remove('listening'); };
            recognition.onerror = () => { micButton.classList.remove('listening'); };
        }

        // --- DIE KI FUNKTION (HIER KOMMT SPÄTER MAIA.AI REIN) ---
        async function askLeonardo(question) {
            isThinking = true;
            micButton.style.opacity = "0.3"; // Button visuell deaktivieren
            statusText.innerText = "Leonardo denkt nach...";
            
            // 1. Kurze Zwischenantwort, damit keine peinliche Stille entsteht
            speak("Einen Moment, ich suche in meinen Aufzeichnungen...");

            // 2. SIMULATION der Wartezeit (Hier binden wir später die Maia-API an)
            // Wir warten 3 Sekunden, um eine echte KI-Antwort zu simulieren
            setTimeout(() => {
                const answer = "Als Leonardo da Vinci fasziniert mich deine Frage zu '" + question + "'. Mein Geist arbeitet noch an der Vollendung dieser Antwort.";
                
                transcriptDiv.innerText = "Leonardo: " + answer;
                speak(answer);
                
                // 3. Nach der Antwort alles wieder freischalten
                isThinking = false;
                micButton.style.opacity = "1";
            }, 3500); 
        }

        // --- DIE SPRECH FUNKTION ---
        function speak(text) {
            window.speechSynthesis.cancel();
            
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'de-DE';
            
            // Stimmen-Suche (Markus für iPad, Conrad für PC)
            const voices = window.speechSynthesis.getVoices();
            let v = voices.find(v => v.name.includes('Markus')) || 
                    voices.find(v => v.name.includes('Conrad')) || 
                    voices.find(v => v.name.includes('Kasper')) ||
                    voices.find(v => v.lang.includes('de') && v.name.toLowerCase().includes('male'));
            
            if(v) msg.voice = v;
            
            msg.pitch = 0.85; // Tiefer
            msg.rate = 0.9;   // Langsamer
            
            // Kleiner Delay für iOS Stabilität
            setTimeout(() => {
                window.speechSynthesis.speak(msg);
            }, 200);
        }

        // --- DER BUTTON KLICK ---
        micButton.addEventListener('click', () => {
            if (isThinking) return; // Klick ignorieren, wenn er gerade denkt

            // iPad Audio-Unlock beim ersten Mal
            if (!isAudioUnlocked) {
                window.speechSynthesis.speak(new SpeechSynthesisUtterance(""));
                isAudioUnlocked = true;
            }
            
            window.speechSynthesis.resume();
            
            if (recognition) {
                try {
                    recognition.start();
                    micButton.classList.add('listening');
                    statusText.innerText = "Ich höre zu...";
                    transcriptDiv.innerText = ""; // Altes löschen für neue Frage
                } catch (e) {
                    console.log("Erkennung läuft bereits");
                }
            }
        });
    </script>
</body>
</html>
