<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Leonardo da Vinci</title>
    <style>
        body { margin: 0; background-color: #000; display: flex; flex-direction: column; height: 100vh; color: #d4af37; font-family: 'Georgia', serif; overflow: hidden; user-select: none; -webkit-user-select: none; }
        #loading-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 60vh; background: #000; display: flex; align-items: center; justify-content: center; z-index: 10; font-style: italic; color: #d4af37; }
        model-viewer { height: 60vh; width: 100%; background: #000; }
        #ui-container { height: 40vh; background: #000; border-top: 1px solid #d4af37; display: flex; flex-direction: column; align-items: center; justify-content: space-between; padding: 15px; box-sizing: border-box; }
        #status-text { font-style: italic; color: #888; font-size: 14px; margin-bottom: 2px; }
        #action-row { display: flex; align-items: center; justify-content: center; width: 100%; position: relative; gap: 20px; }
        #mic-button { width: 80px; height: 80px; border-radius: 50%; border: 2px solid #d4af37; background: #1a1a1a; display: flex; align-items: center; justify-content: center; cursor: pointer; outline: none !important; -webkit-tap-highlight-color: transparent; }
        #mic-button.listening { background: #600; border-color: #f44; box-shadow: 0 0 15px #f44; }
        .museum-btn { background: #111; border: 1px solid #d4af37; color: #d4af37; padding: 12px 20px; font-family: 'Georgia', serif; font-size: 14px; border-radius: 4px; cursor: pointer; transition: all 0.2s; outline: none !important; -webkit-tap-highlight-color: transparent; }
        .museum-btn:active { background: #d4af37; color: #000; }
        #transcript { font-size: 18px; color: #d4af37; text-align: center; width: 95%; height: 90px; overflow-y: auto; margin-top: 5px; line-height: 1.4; }
        svg { fill: #d4af37; width: 36px; height: 36px; pointer-events: none; }
    </style>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
</head>
<body>

    <div id="loading-overlay">Leonardo erwacht...</div>
    <model-viewer id="leo" src="leonardo.glb" interaction-prompt="none" camera-target="0m 1.72m 0m" camera-orbit="0deg 90deg 0.35m" field-of-view="6deg"></model-viewer>

    <div id="ui-container">
        <div id="status-text">Initialisiere Wissen...</div>
        <div id="transcript">Tippe auf das Mikrofon, um zu sprechen...</div>
        <div id="action-row">
            <button id="reset-button" class="museum-btn">Gespräch beenden</button>
            <button id="mic-button">
                <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
            </button>
            <div style="width: 145px; display: block;"></div> 
        </div>
    </div>

    <script>
        const micButton = document.getElementById('mic-button');
        const resetButton = document.getElementById('reset-button');
        const statusText = document.getElementById('status-text');
        const transcriptDiv = document.getElementById('transcript');
        const loadingOverlay = document.getElementById('loading-overlay');

        let recognition = null;
        let isAudioUnlocked = false;
        let isThinking = false; 
        let apiKey = "";
        let leonardoWissen = "";
        let chatHistory = [];

        const FUELLSÄTZE = [
            "Leonardo kramt in seinen Gedanken...",
            "Leonardo mustert dich interessiert...",
            "Ein Lächeln huscht über sein Gesicht...",
            "Er ordnet seine Skizzen im Geiste...",
            "Leonardo überlegt kurz..."
        ];

        document.addEventListener("DOMContentLoaded", async () => {
            apiKey = prompt("Key eingeben:");
            if (!apiKey) {
                statusText.innerText = "Fehler: Kein Key.";
                loadingOverlay.style.display = 'none';
                return;
            }
            await ladeWissen();
            statusText.innerText = "Bereit";
            setTimeout(() => { loadingOverlay.style.display = 'none'; }, 800);
        });

        async function ladeWissen() {
            const dateien = ['Biografie.txt', 'Kunstwerke.txt', 'Erfindungen.txt', 'Arbeitsweise.txt'];
            for (let datei of dateien) {
                try {
                    const response = await fetch(datei);
                    if (response.ok) leonardoWissen += await response.text() + "\n\n";
                } catch (e) { console.error("Fehler beim Laden von: " + datei); }
            }
        }

        resetButton.addEventListener('click', () => {
            window.speechSynthesis.cancel();
            chatHistory = [];
            isThinking = false;
            micButton.style.opacity = "1";
            statusText.innerText = "Bereit";
            transcriptDiv.innerText = "Tippe auf das Mikrofon, um zu sprechen...";
        });

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = 'de-DE';
            recognition.onresult = (event) => {
                if (!isThinking) askLeonardo(event.results[0][0].transcript);
            };
            recognition.onend = () => micButton.classList.remove('listening');
            recognition.onerror = () => micButton.classList.remove('listening');
        }

        async function askLeonardo(question) {
            if (!apiKey || isThinking) return;
            
            isThinking = true;
            micButton.style.opacity = "0.3"; 
            transcriptDiv.innerText = "Du: " + question;
            
            statusText.innerText = FUELLSÄTZE[Math.floor(Math.random() * FUELLSÄTZE.length)];

            try {
                const response = await fetch("https://api.anthropic.com/v1/messages", {
                    method: "POST",
                    headers: { 
                        "Content-Type": "application/json", 
                        "x-api-key": apiKey, 
                        "anthropic-version": "2023-06-01",
                        "anthropic-dangerous-direct-browser-access": "true" 
                    },
                    body: JSON.stringify({
                        model: "claude-haiku-4-5-20251001",
                        max_tokens: 160, 
                        temperature: 0.6,
                        system: `Du bist Leonardo da Vinci. Nutze das WISSEN. REGELN FÜR DICH:\n1. Führe ein menschliches, fließendes Gespräch.\n2. Antworte EXTREM kompakt (maximal 2 bis 3 kurze Sätze!).\n3. Wenn nach mehreren Dingen gefragt wird (z.B. Maschinen), fasse sie in einem eleganten Satz zusammen.\n4. Keine Bulletpoints, keine Listen.\n5. Sei charmant und direkt.\n6. WICHTIG: Nutze NIEMALS Regieanweisungen, beschreibe keine Gestik oder Mimik (wie *lächelt* oder "Leonardo denkt nach"). Sprich AUSSCHLIESSLICH den Text, den du laut sagen würdest.\n\nWISSEN:\n${leonardoWissen}`,
                        messages: [...chatHistory, { role: "user", content: question }]
                    })
                });

                if (!response.ok) throw new Error("API-Fehler");
                const data = await response.json();
                
                let antwort = data.content[0].text.trim();
                const letzterPunkt = Math.max(antwort.lastIndexOf('.'), antwort.lastIndexOf('!'), antwort.lastIndexOf('?'));
                if (letzterPunkt > 0 && letzterPunkt < antwort.length - 1) antwort = antwort.substring(0, letzterPunkt + 1);

                chatHistory.push({ role: "user", content: question });
                chatHistory.push({ role: "assistant", content: antwort });
                if (chatHistory.length > 8) chatHistory = chatHistory.slice(-8);

                transcriptDiv.innerText = "Leonardo: " + antwort;
                speak(antwort);

            } catch (error) {
                transcriptDiv.innerText = "Leonardo schaut nachdenklich. (Netzwerkfehler)";
            }

            isThinking = false;
            micButton.style.opacity = "1";
            statusText.innerText = "Bereit";
        }

        function speak(text) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'de-DE';
            
            const voices = window.speechSynthesis.getVoices();
            let v = voices.find(v => v.name.includes('Markus') || v.name.includes('Conrad') || v.name.includes('Kasper') || (v.lang.includes('de') && v.name.toLowerCase().includes('male')));
            if (v) msg.voice = v;
            
            msg.pitch = 0.85; 
            msg.rate = 0.95;  
            
            setTimeout(() => { window.speechSynthesis.speak(msg); }, 50);
        }

        micButton.addEventListener('click', () => {
            if (isThinking) return; 

            if (!isAudioUnlocked) {
                const unlockMsg = new SpeechSynthesisUtterance("");
                window.speechSynthesis.speak(unlockMsg);
                isAudioUnlocked = true;
            }
            window.speechSynthesis.resume();
            
            if (recognition) {
                try {
                    recognition.start();
                    micButton.classList.add('listening');
                    statusText.innerText = "Ich höre zu...";
                } catch (e) {} 
            }
        });
    </script>
</body>
</html>
